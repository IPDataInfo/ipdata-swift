name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer
      - run: swift build
      - run: swift test
      - name: Live smoke test
        run: IPDATA_LIVE=1 swift test
